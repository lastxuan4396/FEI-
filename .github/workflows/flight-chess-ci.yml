name: flight-chess-ci

on:
  push:
    paths:
      - 'flight-chess-share/**'
      - '.github/workflows/flight-chess-ci.yml'
  pull_request:
    paths:
      - 'flight-chess-share/**'
      - '.github/workflows/flight-chess-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flight-chess-share
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: flight-chess-share/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Syntax check
        run: node --check server.js
      - name: Test suite
        run: npm run test:all
