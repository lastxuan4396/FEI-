    <text x="767" y="367" fill="#47372A" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">ARCHIVE</text>
    <text x="860" y="367" fill="#FFF7ED" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">DROP</text>

    <text x="640" y="407" fill="#7A4A27" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.3">WHY IT WORKS</text>
    <text x="640" y="444" fill="#1E1713" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Hard benefits, not soft promises.</text>
    <text x="640" y="472" fill="#6A594A" font-family="Arial, Helvetica, sans-serif" font-size="17">Save space. Reduce clutter. Avoid the</text>
    <text x="640" y="495" fill="#6A594A" font-family="Arial, Helvetica, sans-serif" font-size="17">heavy feeling of opening Downloads.</text>
