    <rect x="610" y="314" width="320" height="138" rx="24" fill="url(#card)"/>

    <text x="640" y="203" fill="#7A4A27" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.3">TODAY'S FILE BILL</text>
    <text x="640" y="244" fill="#1E1713" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">IMG_8473.PNG</text>
