    <text x="300" y="280" fill="#FFF7ED" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">Checkout</text>
    <text x="300" y="324" fill="#F2DDC9" font-family="Arial, Helvetica, sans-serif" font-size="24">Turn the messiest folder into</text>
    <text x="300" y="356" fill="#F2DDC9" font-family="Arial, Helvetica, sans-serif" font-size="24">a card-by-card cleanup flow.</text>

    <rect x="300" y="393" width="172" height="22" rx="11" fill="#B66132"/>
    <rect x="480" y="393" width="76" height="22" rx="11" fill="#6E8B63"/>

