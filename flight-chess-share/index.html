<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>情侣飞行棋 V2.3（联机分享版）</title>
    <meta name="description" content="支持联机房间、实时位置、回合时间线、截图导出的情侣飞行棋分享版。" />
    <meta property="og:title" content="情侣飞行棋 V2.3（联机分享版）" />
    <meta property="og:description" content="创建房间后可异地对战，支持完整复盘与分享。" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <div id="mobileTools" class="mobile-tools">
      <button id="toggleDrawerBtn" class="btn-soft">打开面板</button>
      <button id="boardFullscreenBtn" class="btn-soft">全屏棋盘</button>
    </div>
    <main class="layout">
      <section class="panel board-panel">
        <canvas id="board" width="980" height="980"></canvas>
      </section>

      <aside class="panel side">
        <section class="card">
          <h2>联机房间</h2>
          <div class="field" style="margin-bottom: 8px">
            <label for="langSelect">界面语言</label>
            <select id="langSelect">
              <option value="zh-CN">中文</option>
              <option value="en-US">English</option>
            </select>
          </div>
          <div class="field" style="margin-bottom: 8px">
            <label for="boardZoomRange">棋盘缩放</label>
            <div class="zoom-row">
              <input id="boardZoomRange" type="range" min="80" max="130" step="5" value="120" />
              <span id="boardZoomText" class="tiny">120%</span>
            </div>
          </div>
          <div class="field">
            <label for="roomInput">房间号（4-8位）</label>
            <input id="roomInput" placeholder="例如 A7K9X2" />
          </div>
          <div class="field" style="margin-top: 8px">
            <label for="roomPasswordInput">房间密码（可选）</label>
            <input id="roomPasswordInput" type="password" placeholder="创建时可设置，加入需填写" />
          </div>
          <div class="field" style="margin-top: 8px">
            <label for="packSelect">文案包</label>
            <div class="row">
              <select id="packSelect" style="min-height: 44px; flex: 1">
                <option value="classic">加载中...</option>
              </select>
              <button id="applyPackBtn" class="btn-soft">切换文案包</button>
            </div>
          </div>
          <div class="row" style="margin-top: 8px">
            <button id="createRoomBtn" class="btn-blue">创建房间</button>
            <button id="joinRoomBtn" class="btn-blue">加入房间</button>
            <button id="joinWatchBtn" class="btn-soft">观战加入</button>
            <button id="leaveRoomBtn" class="btn-danger">退出房间</button>
          </div>
          <div class="row" style="margin-top: 8px">
            <button id="copyRoomLinkBtn" class="btn-soft">复制房间链接</button>
            <button id="copyWatchLinkBtn" class="btn-soft">复制观战链接</button>
            <button id="copyShortLinkBtn" class="btn-soft">复制短链</button>
            <button id="shareRoomBtn" class="btn-soft">系统分享</button>
          </div>
          <div class="row" style="margin-top: 8px; align-items: center">
            <img id="qrPreview" class="qr-preview" alt="房间二维码" />
            <p id="reconnectHint" class="tiny" style="margin: 0">断线重连：30 分钟内可自动恢复到原座位</p>
          </div>
          <p id="roomStatus" class="tiny" style="margin: 8px 0 0">状态：离线本地模式</p>
          <p id="realtimeStatus" class="tiny" style="margin: 4px 0 0">实时通道：未连接</p>
        </section>

        <section class="card">
          <h2>对局状态</h2>
          <div class="status-grid">
            <div id="turnText"></div>
            <div id="diceText"></div>
            <div id="msgText"></div>
            <div id="seatText"></div>
            <div id="countdownText"></div>
            <div class="timer-bar"><span id="countdownBar"></span></div>
          </div>
          <div class="row" style="margin-top: 8px">
            <button id="rollBtn" class="btn-primary">掷骰子</button>
            <button id="restartBtn">重新开始</button>
          </div>
          <div class="row" style="margin-top: 8px">
            <button id="exportImageBtn" class="btn-soft">导出棋盘图</button>
            <button id="exportTextBtn" class="btn-soft">导出复盘文本</button>
            <button id="exportReportBtn" class="btn-soft">导出赛后战报图</button>
            <button id="enableNotifyBtn" class="btn-soft">开启到你提醒</button>
          </div>
          <div class="tiny" id="versionText" style="margin-top: 8px">版本：-</div>
        </section>

        <section class="card">
          <h2>房间聊天</h2>
          <div class="chat-box">
            <ul id="chatList" class="chat-list"></ul>
            <div class="emoji-row">
              <button class="btn-soft emoji-btn" data-emoji="👍">👍</button>
              <button class="btn-soft emoji-btn" data-emoji="🔥">🔥</button>
              <button class="btn-soft emoji-btn" data-emoji="😂">😂</button>
              <button class="btn-soft emoji-btn" data-emoji="❤️">❤️</button>
              <button class="btn-soft emoji-btn" data-emoji="🎉">🎉</button>
            </div>
            <div class="row">
              <input id="chatInput" placeholder="输入聊天内容..." />
              <button id="chatSendBtn" class="btn-blue">发送</button>
            </div>
          </div>
        </section>

        <section class="card">
          <h2>实时位置</h2>
          <div class="positions">
            <article class="pos">
              <h3>男方（红）</h3>
              <p id="redPosText"></p>
              <p id="redCellText"></p>
              <div class="progress"><span id="redProgress"></span></div>
            </article>
            <article class="pos">
              <h3>女方（蓝）</h3>
              <p id="bluePosText"></p>
              <p id="blueCellText"></p>
              <div class="progress"><span id="blueProgress"></span></div>
            </article>
          </div>
        </section>

        <section class="card">
          <h2>格子详情</h2>
          <h3 id="cellDetailTitle" class="muted">未选择格子</h3>
          <p id="cellDetailBody" class="detail-body">点击棋盘格子可查看完整文案。</p>
          <p id="lastTriggerText" class="tiny" style="margin: 8px 0 0"></p>
        </section>

        <section class="card">
          <h2>历史点数</h2>
          <div class="dice-lanes">
            <div class="dice-lane">
              <h3>男方（红）</h3>
              <div id="redDiceRow" class="chips"></div>
            </div>
            <div class="dice-lane">
              <h3>女方（蓝）</h3>
              <div id="blueDiceRow" class="chips"></div>
            </div>
          </div>
        </section>

        <section class="card">
          <h2>回合时间线</h2>
          <div class="row" style="margin-bottom: 8px">
            <span id="integrityBadge" class="pill warn">日志签名：待校验</span>
          </div>
          <div class="row" style="margin-bottom: 8px">
            <button id="replayPrevBtn" class="btn-soft">回放上一步</button>
            <button id="replayNextBtn" class="btn-soft">回放下一步</button>
            <button id="replayExitBtn" class="btn-soft">退出回放</button>
            <button id="spectatorReplayBtn" class="btn-soft">观战只读回放：关</button>
          </div>
          <div class="field" style="margin-bottom: 8px">
            <label for="replayRange">回放滑杆</label>
            <input id="replayRange" type="range" min="0" max="0" step="1" value="0" />
          </div>
          <div class="field" style="margin-bottom: 8px">
            <label for="timelineFilterSelect">时间线筛选</label>
            <select id="timelineFilterSelect">
              <option value="all">全部</option>
              <option value="男方">男方</option>
              <option value="女方">女方</option>
              <option value="超时">超时事件</option>
            </select>
          </div>
          <div id="replayStatusText" class="tiny" style="margin-bottom: 8px">回放：关闭</div>
          <ol id="timelineList" class="timeline"></ol>
        </section>

        <section class="card">
          <h2>自定义文案包编辑器</h2>
          <p class="tiny" style="margin: 0 0 8px">每行一个格子文案，必须 44 行。在线房间中保存后会自动同步给双方并重开。</p>
          <div class="field">
            <label for="customPackTitleInput">标题</label>
            <input id="customPackTitleInput" value="情侣飞行棋 自定义版" />
          </div>
          <div class="field" style="margin-top: 8px">
            <label for="customPackSubtitleInput">副标题</label>
            <input id="customPackSubtitleInput" value="联机双人版" />
          </div>
          <div class="field" style="margin-top: 8px">
            <label for="customPackCellsInput">44 格文案</label>
            <textarea id="customPackCellsInput" style="width: 100%; min-height: 180px; border: 1px solid #d7d1c1; border-radius: 10px; padding: 8px; font-size: 12px"></textarea>
          </div>
          <div class="row" style="margin-top: 8px">
            <button id="loadCurrentPackBtn" class="btn-soft">读取当前文案</button>
            <button id="applyCustomPackBtn" class="btn-blue">应用自定义文案包</button>
          </div>
        </section>
      </aside>
    </main>

    <div id="orientationHint">建议横屏查看，格子文案会更清晰。</div>

    <script defer src="/app/main.js"></script>
  </body>
</html>
