<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>互动测试站 | 三观认知测评</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23e97c41'/%3E%3Cpath d='M19 34h26v6H19zM19 23h26v6H19zM19 45h18v6H19z' fill='white'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-layer"></div>
  <main class="app-shell">
    <section id="start-screen" class="panel">
      <p class="eyebrow">互动测试站</p>
      <h1>三观认知测评</h1>
      <p class="lead">10 道情境题，看看你在世界观、人生观、价值观上的思考倾向。</p>
      <ul class="facts">
        <li>预计 3 分钟</li>
        <li>无对错，只有倾向</li>
        <li>手机和电脑都可用</li>
        <li>可复制结果分享</li>
      </ul>
      <button id="start-btn" class="btn btn-primary">开始测试</button>
    </section>

    <section id="quiz-screen" class="panel hidden">
      <header class="quiz-header">
        <span id="progress-label">第 1 / 10 题</span>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </header>

      <article class="question-card">
        <h2 id="question-text"></h2>
        <div id="options-list" class="options-list"></div>
      </article>

      <div class="actions">
        <button id="prev-btn" class="btn btn-ghost">上一题</button>
        <button id="next-btn" class="btn btn-primary" disabled>下一题</button>
      </div>
    </section>

    <section id="result-screen" class="panel hidden">
      <p class="eyebrow">结果已生成</p>
      <h2 id="result-title"></h2>
      <p id="result-subtitle" class="result-subtitle"></p>

      <div id="score-grid" class="score-grid"></div>

      <article class="result-card">
        <h3>你的认知特征</h3>
        <p id="result-strength"></p>
        <h3>可继续打磨</h3>
        <p id="result-tip"></p>
      </article>

      <div class="actions result-actions">
        <button id="copy-btn" class="btn btn-primary">复制结果文案</button>
        <button id="restart-btn" class="btn btn-ghost">再测一次</button>
      </div>

      <p id="copy-feedback" class="copy-feedback" aria-live="polite"></p>

      <section id="history-block" class="history hidden">
        <h3>最近记录</h3>
        <ul id="history-list"></ul>
      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
