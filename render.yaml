services:
  - type: web
    name: sanguan-cognition-test
    runtime: static
    repo: https://github.com/lastxuan4396/FEI-.git
    rootDir: interactive-test-site
    branch: main
    autoDeploy: true
    buildCommand: echo "Static site deploy"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
